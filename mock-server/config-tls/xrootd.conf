###########################################################################
# XRootD Mock Server Configuration with TLS (No Authentication)
# For development and testing purposes only
###########################################################################

# Export directory for file access
all.export /data

# Server settings
xrootd.seclib none
xrootd.auth none

# Admin and PID paths
all.adminpath /var/spool/xrootd
all.pidpath /run/xrootd

# Log configuration
xrootd.log /var/log/xrootd/xrootd.log
xrootd.trace all debug

# Server port
all.role server
all.manager localhost:1094

# TLS configuration
xrootd.tls /etc/xrootd/certs/cert.pem /etc/xrootd/certs/key.pem
xrootd.tlsmode all

# Security settings - disable authentication for testing
sec.protocol none
sec.level none

# Allow all operations
all.allow host *
