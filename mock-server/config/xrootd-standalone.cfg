###########################################################################
# XRootD Mock Server - Simplified Configuration
# No authentication, no TLS, for development/testing only
###########################################################################

# Export directory
all.export /data

# Server settings
all.role server

# Load POSIX file system
xrootd.fslib libXrdPosix.so

# Disable authentication
sec.protocol none
sec.level none

# Allow all operations
cms.allow host *
ofs.authorize

# Admin and PID paths - use /tmp for simplicity
all.adminpath /tmp/xrootd
all.pidpath /tmp/xrootd

# Logging
xrd.trace all debug
