###########################################################################
# XRootD CI Configuration
# Used by test-matrix.yml (no Docker)
###########################################################################

all.role server

# 1. 物理路径映射：使用纯字母变量名，XRootD 解析器就能完美识别
oss.localroot $MOCKROOT

# 2. 虚拟路径导出：允许客户端访问 /data 路径
all.export /data

# Disable authentication completely
sec.protocol none

# Allow all
cms.allow host *

# Admin 路径使用纯字母环境变量
all.adminpath $MOCKROOT/data
all.pidpath $MOCKROOT/data

# Networking
xrd.network keepalive kaparms 10m,1m,5
xrd.timeout idle 60m