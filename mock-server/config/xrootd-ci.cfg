###########################################################################
# XRootD CI Configuration
# Used by test-matrix.yml (no Docker — relies on /data symlink)
###########################################################################

all.role server
all.export /data

# Disable authentication completely
sec.protocol none

# Allow all
cms.allow host *

# Paths — same base dir as prepare.ts (./mock-server/data)
all.adminpath ./mock-server/data
all.pidpath ./mock-server/data

# Networking
xrd.network keepalive kaparms 10m,1m,5
xrd.timeout idle 60m
