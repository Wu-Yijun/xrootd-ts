###########################################################################
# XRootD CI Configuration
# Used by test-matrix.yml (no Docker — relies on /data symlink)
###########################################################################

all.role server

# 1. 物理路径映射：设置本地文件系统的根前缀（动态读取环境变量）
oss.localroot $MOCK_ROOT_DIR

# 2. 虚拟路径导出：允许客户端访问 /data 路径
all.export /data

# Disable authentication completely
sec.protocol none

# Allow all
cms.allow host *

# Admin 路径最好也使用环境变量保持一致
all.adminpath $MOCK_ROOT_DIR/data
all.pidpath $MOCK_ROOT_DIR/data

# Networking
xrd.network keepalive kaparms 10m,1m,5
xrd.timeout idle 60m