###########################################################################
# XRootD Mock Server Configuration
# Simple configuration for development/testing
###########################################################################

# Export directory
all.export /data

# Server settings
all.role server
all.manager localhost:1094

# Admin and PID paths
all.adminpath /var/spool/xrootd
all.pidpath /run/xrootd

# Disable authentication
sec.protocol none
sec.level none

# Allow all operations
cms.allow host *

# Logging
xrd.trace all debug
