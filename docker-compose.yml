services:
  xrootd-mock:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: xrootd-mock-server
    ports:
      - "1094:1094"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1094 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
