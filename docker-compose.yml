services:
  xrootd-mock:
    image: opensciencegrid/xrootd-standalone:24-testing-20260615-1618
    container_name: xrootd-mock-server
    ports:
      - "1094:1094"
    volumes:
      - ./mock-server/config/xrootd-standalone.cfg:/etc/xrootd/xrootd-standalone.cfg:ro
      - ./mock-server/config/10-xrootd-standalone.conf:/etc/supervisord.d/10-xrootd-standalone.conf:ro
      - ./mock-server/data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo test > /dev/tcp/localhost/1094'"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
